# ohloud is a static SPA — serve the folder, fall back to index.html for
# client-side routes, long-cache the content-hashed assets, and add a couple of
# hardening headers the in-page meta CSP can't set (notably anti-clickjacking).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Applied to the HTML shell: it is served via `location /`, which sets no
    # headers of its own and therefore inherits these.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Content-hashed build assets never change — cache them hard.
    location /_nuxt/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Always revalidate the service worker so updates roll out promptly.
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }

    # SPA fallback: unknown paths are client-side routes → serve the shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
