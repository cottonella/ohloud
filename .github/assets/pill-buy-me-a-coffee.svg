<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 157 36" width="157" height="36" role="img" aria-label="Buy me a coffee">
  <defs>
    <!-- The app's .pill-kofi glow: 0 2px 8px rgb(214 122 154 / 0.25). -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#d67a9a" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect x="2" y="3" width="153" height="30" rx="15" fill="#fcdfeb" filter="url(#glow)"/>
  <!-- The ko-fi cup (24-box) at 20 px. The cup is top-heavy (wide rim high in its
       box), so it reads high — same +1px nudge down as the app's .kofi-cup. -->
  <g transform="translate(14,9) scale(0.8333)" fill="none" stroke="#1a1a1a" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4.4 6.7h11.2V14a4 4 0 0 1-4 4h-3.2a4 4 0 0 1-4-4Z" fill="#fff"/>
    <path d="M15.6 8.9a2.8 2.8 0 0 1 0 5.4" fill="none"/>
    <path d="M10 15.05c-1.75-1.18-2.68-2.05-2.68-3.12 0-.82.62-1.4 1.35-1.4.62 0 1.05.33 1.33.77.28-.44.71-.77 1.33-.77.73 0 1.35.58 1.35 1.4 0 1.07-.93 1.94-2.68 3.12Z" fill="#e8324a" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="40" y="18" font-family="-apple-system,'Segoe UI',system-ui,Roboto,Helvetica,Arial,sans-serif" font-size="13" font-weight="600" fill="#b1436a" dominant-baseline="central" textLength="101">Buy me a coffee</text>
</svg>
