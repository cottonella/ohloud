name: CI

# Lint + tests + the full build (static site AND the Electron main bundle) on
# every PR and push to main. This is what turns a Dependabot bump into a
# self-verifying PR: same-repo PRs run THIS file as modified by the PR, so a
# bumped checkout/setup-node proves itself in the very run that gates its merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 24 # ships npm 11 — must match the lockfile toolchain
          cache: npm
      - name: Install (skip Electron binary — nothing is packaged here)
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      - run: npm run lint
      - run: npm test
      # `build` = `generate` (the site) + the Electron main vite bundle, so a PR
      # that breaks electron/ can't slip through to release time. Packaging with
      # electron-builder (which is what needs the binary) stays release-only.
      - name: Build the site + Electron main
        run: npm run build
