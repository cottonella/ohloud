name: CI

# Lint + tests + the static-site build on every PR/push to main, PLUS a Tauri
# Rust compile check — the desktop app's Rust core is only ever compiled in CI,
# so this is where a broken src-tauri/ (or the webkit2gtk version pin) is caught.
# Same-repo PRs run THIS file as modified by the PR, so a bumped
# checkout/setup-node/action proves itself in the very run that gates its merge.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - name: Install
        run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - name: Build the static site
        run: npm run generate

  # Compile the Tauri Rust core (embedding the built frontend via
  # generate_context!) so a change that breaks src-tauri/ or the config can't
  # slip through to release time. Bundling installers stays release-only, and
  # --debug --no-bundle keeps this fast.
  tauri:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - name: Install Tauri Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
          # Only main writes the cache. A branch restores main's copy but never
          # saves its own — a per-branch save is a sibling-scoped clone no other
          # branch can read, so it just bloats the 10 GB pool and evicts real
          # caches. Merging to main re-warms it for everyone.
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Install
        run: npm ci
      - name: Compile the desktop app (no bundle)
        run: npm run tauri build -- --debug --no-bundle
