name: Release

# Runs when a version tag (v*) is pushed. A guard job additionally refuses to
# deploy unless the tagged commit is on main. Manually dispatching it instead
# (Actions → Release → Run workflow) is a REHEARSAL: every job builds with the
# current action versions, but nothing is deployed, pushed, or published —
# handy for proving a Dependabot action bump before spending a version tag.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release
  pages: write # deploy to GitHub Pages
  id-token: write # OIDC token the Pages deploy needs
  actions: write # prune a stale github-pages artifact left by a re-run

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Gate: only tags that live on main may proceed ─────────────────────────────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure the tag is on main
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Rehearsal run — no tag to verify."
            exit 0
          fi
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "OK: $GITHUB_REF_NAME is on main."
          else
            echo "::error::Tag $GITHUB_REF_NAME is not on main — refusing to release."
            exit 1
          fi

  # ── The web app → GitHub Pages (base '/', for the custom domain) ──────────────
  pages:
    needs: verify
    runs-on: ubuntu-latest
    # Rehearsals bind a throwaway 'rehearsal' environment, so github-pages can
    # keep a strict branch policy (dependabot/* stays locked out) while the
    # build still runs — the deploy step is event-gated off in rehearsals anyway.
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && 'rehearsal' || 'github-pages' }}
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # ships npm 11 — must match the lockfile toolchain
          cache: npm
      - name: Install (skip Electron binary — web build only)
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: 1
      - name: Generate the static site
        run: npm run generate
      - name: SPA fallback, disable Jekyll, attach custom domain
        run: |
          cp .output/public/index.html .output/public/404.html
          touch .output/public/.nojekyll
          if [ -n "${{ vars.SITE_DOMAIN }}" ]; then
            echo "${{ vars.SITE_DOMAIN }}" > .output/public/CNAME
            echo "CNAME set to ${{ vars.SITE_DOMAIN }}"
          fi
      - uses: actions/configure-pages@v5
      # A re-run leaves the previous attempt's immutable `github-pages` artifact
      # in place; uploading a second makes deploy-pages choke on "Multiple
      # artifacts named github-pages". Prune any leftovers before we upload —
      # only ever needed from attempt 2 onward, so the first run pays nothing.
      - name: Drop a stale github-pages artifact from a previous attempt
        if: ${{ github.run_attempt > 1 }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' \
          | while read -r id; do
              echo "Deleting stale github-pages artifact $id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
            done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public
      - id: deploy
        if: ${{ github.event_name != 'workflow_dispatch' }} # rehearsal builds, never deploys
        uses: actions/deploy-pages@v5

  # ── Desktop apps: one artifact per OS, renamed to ohloud-<version>-<platform> ──
  desktop:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            glob: dist-electron/*.zip
            ext: zip
          - os: macos-latest
            platform: mac
            glob: dist-electron/*.zip
            ext: zip
          - os: ubuntu-latest
            platform: linux
            glob: dist-electron/*.AppImage
            ext: AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # ships npm 11 — must match the lockfile toolchain
          cache: npm
      - name: Install
        run: npm ci
      - name: Build web + Electron main
        run: npm run build
      - name: Package the desktop app
        run: npx electron-builder --publish never
        env:
          # Ship an unsigned build — don't try to auto-discover signing certs.
          CSC_IDENTITY_AUTO_DISCOVERY: false
      # Stage into a workspace-relative dir, not /tmp: on the Windows runner
      # Git Bash's /tmp and the Node upload-artifact action's /tmp resolve to
      # different places, so the upload saw nothing. A relative path is resolved
      # against GITHUB_WORKSPACE by both, so they agree on every OS.
      - name: Stage the renamed artifact
        shell: bash
        run: |
          ver="${GITHUB_REF_NAME#v}"
          ver="${ver//\//-}" # rehearsals dispatch from branches whose names may carry slashes (dependabot/…)
          mkdir -p staging
          file=$(ls ${{ matrix.glob }} | head -n1)
          dest="staging/ohloud-${ver}-${{ matrix.platform }}.${{ matrix.ext }}"
          cp "$file" "$dest"
          echo "Staged $file -> $dest"
      - uses: actions/upload-artifact@v4
        with:
          name: ohloud-${{ matrix.platform }}
          path: staging/*
          if-no-files-found: error

  # ── The web app as a container image → GitHub Container Registry ──────────────
  # Runs independently: if this fails, the Pages/desktop/release jobs still ship.
  image:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      packages: write # push to ghcr.io
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3 # arm64 emulation for the multi-arch build
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' }} # rehearsal builds, never pushes
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Collect all three artifacts and publish one GitHub Release ────────────────
  release:
    needs: [verify, desktop]
    runs-on: ubuntu-latest
    steps:
      - name: Download all desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/dl
          merge-multiple: true
      - name: List what we got
        run: ls -R /tmp/dl
      # Bare filenames (no paths) so anyone can verify a download with a plain
      # `sha256sum -c SHA256SUMS.txt` next to the file they grabbed.
      - name: Write SHA-256 checksums
        run: |
          cd /tmp/dl
          sha256sum ohloud-* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        if: ${{ github.event_name != 'workflow_dispatch' }} # rehearsal stops short of a Release
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            /tmp/dl/ohloud-*-windows.zip
            /tmp/dl/ohloud-*-mac.zip
            /tmp/dl/ohloud-*-linux.AppImage
            /tmp/dl/SHA256SUMS.txt
