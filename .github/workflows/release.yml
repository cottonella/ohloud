name: Release

# Runs when a version tag (v*) is pushed. A guard job additionally refuses to
# deploy unless the tagged commit is on main. Manually dispatching it instead
# (Actions → Release → Run workflow) is a REHEARSAL: every job builds with the
# current action versions, but nothing is deployed, pushed, or published —
# handy for proving a Dependabot action bump before spending a version tag.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # create the GitHub Release
  pages: write # deploy to GitHub Pages
  id-token: write # OIDC token the Pages deploy needs
  actions: write # prune a stale github-pages artifact left by a re-run

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Gate: only tags that live on main may proceed ─────────────────────────────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Ensure the tag is on main
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Rehearsal run — no tag to verify."
            exit 0
          fi
          git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "OK: $GITHUB_REF_NAME is on main."
          else
            echo "::error::Tag $GITHUB_REF_NAME is not on main — refusing to release."
            exit 1
          fi

  # ── The web app → GitHub Pages (base '/', for the custom domain) ──────────────
  pages:
    needs: verify
    runs-on: ubuntu-latest
    # Rehearsals bind a throwaway 'rehearsal' environment, so github-pages can
    # keep a strict branch policy (dependabot/* stays locked out) while the
    # build still runs — the deploy step is event-gated off in rehearsals anyway.
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && 'rehearsal' || 'github-pages' }}
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json # engines.node — the one place to bump at LTS time
          cache: npm
      - name: Install
        run: npm ci
      - name: Generate the static site
        run: npm run generate
      - name: SPA fallback, disable Jekyll, attach custom domain
        run: |
          cp .output/public/index.html .output/public/404.html
          touch .output/public/.nojekyll
          if [ -n "${{ vars.SITE_DOMAIN }}" ]; then
            echo "${{ vars.SITE_DOMAIN }}" > .output/public/CNAME
            echo "CNAME set to ${{ vars.SITE_DOMAIN }}"
          fi
      - uses: actions/configure-pages@v6
      # A re-run leaves the previous attempt's immutable `github-pages` artifact
      # in place; uploading a second makes deploy-pages choke on "Multiple
      # artifacts named github-pages". Prune any leftovers before we upload —
      # only ever needed from attempt 2 onward, so the first run pays nothing.
      - name: Drop a stale github-pages artifact from a previous attempt
        if: ${{ github.run_attempt > 1 }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
            --jq '.artifacts[] | select(.name=="github-pages") | .id' \
          | while read -r id; do
              echo "Deleting stale github-pages artifact $id"
              gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id"
            done
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .output/public
          # v4 started silently dropping dotfiles from the artifact. Keep them:
          # .nojekyll above, and any future .well-known/ (security.txt etc.).
          include-hidden-files: true
      - id: deploy
        if: ${{ github.event_name != 'workflow_dispatch' }} # rehearsal builds, never deploys
        uses: actions/deploy-pages@v5

  # ── Desktop apps: native installers per OS, built + bundled by Tauri ──────────
  # tauri-action runs `npm run generate` (the config's beforeBuildCommand),
  # compiles the Rust core, and produces installers. With no tagName/releaseId it
  # only BUILDS — the release job below does the publishing, so the deploy gate
  # (and the rehearsal skip) stays in one place.
  desktop:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            rust-targets: ""
            args: ""
          - os: macos-latest # Apple-silicon runner; universal target covers Intel too
            platform: mac
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - os: ubuntu-22.04 # pin the glibc/webkit baseline of the AppImage
            platform: linux
            rust-targets: ""
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Install Tauri Linux build deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json # engines.node — the one place to bump at LTS time
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target
      - name: Install
        run: npm ci
      - name: Build the Tauri installers
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
      # Portable Windows build: a Tauri exe is self-contained (WebView2 is a system
      # runtime + the frontend is embedded), so zipping the compiled binary IS the
      # portable app. Tauri has no zip bundler, so we make it here.
      - name: Package the portable Windows app
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $ver = (Get-Content package.json -Raw | ConvertFrom-Json).version
          New-Item -ItemType Directory -Force staging | Out-Null
          Compress-Archive -Path src-tauri/target/release/ohloud.exe -DestinationPath "staging/ohloud_${ver}_x64-portable.zip" -Force
      # Flatten this OS's installer into one dir (msi on Windows, AppImage on Linux,
      # dmg on macOS — alongside the portable zip staged above). Tauri's filenames
      # already carry version + arch (e.g. ohloud_0.3.39_x64_en-US.msi). A
      # workspace-relative staging dir keeps the Windows runner's Git Bash /tmp and
      # upload-artifact agreeing on the path.
      - name: Stage the installers
        shell: bash
        run: |
          mkdir -p staging
          find src-tauri/target -type f -path '*/release/bundle/*' \
            \( -name '*.msi' -o -name '*.dmg' -o -name '*.AppImage' \) \
            -exec cp {} staging/ \;
          ls -R staging
      # Turn every release (and every rehearsal) into a real test that the four
      # shipped artifacts actually got built — a config regression that drops one
      # fails here loudly instead of silently shipping a gap.
      - name: Verify the expected artifacts exist
        shell: bash
        run: |
          need() { ls staging/$1 >/dev/null 2>&1 || { echo "::error::Missing expected artifact: $1"; exit 1; }; }
          case "${{ matrix.platform }}" in
            windows) need '*.msi'; need '*-portable.zip' ;;
            linux)   need '*.AppImage' ;;
            mac)     need '*.dmg' ;;
          esac
          echo "OK: expected artifacts present for ${{ matrix.platform }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ohloud-${{ matrix.platform }}
          path: staging/*
          if-no-files-found: error

  # ── The web app as a container image → GitHub Container Registry ──────────────
  # Runs independently: if this fails, the Pages/desktop/release jobs still ship.
  image:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
      packages: write # push to ghcr.io
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4.1.0 # arm64 emulation for the multi-arch build
      - uses: docker/setup-buildx-action@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' }} # rehearsal builds, never pushes
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Collect all three artifacts and publish one GitHub Release ────────────────
  release:
    needs: [verify, desktop]
    runs-on: ubuntu-latest
    steps:
      # Only the desktop artifacts — without a pattern, merge-multiple pulls
      # EVERY artifact on the run (the pages tarball, and since build-push v7 a
      # *.dockerbuild build record), and any one of them failing to download
      # fails the whole job.
      - name: Download the desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ohloud-*
          path: /tmp/dl
          merge-multiple: true
      - name: List what we got
        run: ls -R /tmp/dl
      # Bare filenames (no paths) so anyone can verify a download with a plain
      # `sha256sum -c SHA256SUMS.txt` next to the file they grabbed.
      - name: Write SHA-256 checksums
        run: |
          cd /tmp/dl
          # `ohloud*` matches every installer (ohloud_… and the rpm's ohloud-…)
          # while excluding the checksum file we're writing.
          sha256sum ohloud* > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - uses: softprops/action-gh-release@v2
        if: ${{ github.event_name != 'workflow_dispatch' }} # rehearsal stops short of a Release
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            /tmp/dl/ohloud*
            /tmp/dl/SHA256SUMS.txt
